<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta name="description" content="CyberLearn 是防禦型資安學習平台，透過情境陷阱與題庫實戰練習學習密碼安全、釣魚郵件、社交工程與 2FA 防禦觀念。"/>
<meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1"/>
<meta property="og:type" content="website"/>
<meta property="og:title" content="CyberLearn — 資安學習平台"/>
<meta property="og:description" content="以關卡式互動學習建立資安防禦思維，從密碼強度到釣魚郵件逐步強化。"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="CyberLearn — 資安學習平台"/>
<meta name="twitter:description" content="防禦型資安學習平台，提供情境陷阱、知識說明與測驗。"/>
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebSite","name":"CyberLearn","inLanguage":"zh-TW","url":"https://cybersecurity.nex11.me"}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CyberLearn — 資安學習平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: {
        display: ['Urbanist', 'system-ui', 'sans-serif'],
        body: ['DM Sans', 'system-ui', 'sans-serif'],
        mono: ['Fira Code', 'monospace'],
      },
      colors: {
        base: { DEFAULT: '#08090f', 50: '#12141f', 100: '#1a1d2e', 200: '#2a2d3e', 300: '#3a3d4e' },
        accent: { DEFAULT: '#f97316', light: '#fb923c', dark: '#ea580c' },
        info: { DEFAULT: '#06b6d4', light: '#22d3ee' },
        ok: { DEFAULT: '#22c55e', light: '#4ade80' },
        warn: { DEFAULT: '#eab308' },
        danger: { DEFAULT: '#ef4444', light: '#f87171' },
        txt: { DEFAULT: '#eef0f6', muted: '#8b8fa3', dim: '#5b5f73' },
      }
    }
  }
}
</script>
<style>
  /* ── Base ── */
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: #08090f; color: #eef0f6; -webkit-font-smoothing: antialiased; }
  ::selection { background: rgba(249,115,22,0.3); }
  input:focus { outline: none; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #12141f; }
  ::-webkit-scrollbar-thumb { background: #2a2d3e; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3d4e; }

  /* ── Card ── */
  .card {
    background: #12141f;
    border: 1px solid #2a2d3e;
    border-radius: 12px;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
  }
  .card:hover:not(.locked) {
    border-color: #3a3d4e;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .card.interactive:hover:not(.locked) {
    transform: translateY(-2px);
    border-color: rgba(249,115,22,0.4);
    cursor: pointer;
  }
  .card.locked {
    opacity: 0.45;
    filter: grayscale(0.5);
    cursor: not-allowed;
  }
  .card.completed {
    border-color: rgba(34,197,94,0.3);
  }

  /* ── Input ── */
  .field {
    background: #1a1d2e;
    border: 1px solid #2a2d3e;
    border-radius: 8px;
    padding: 10px 14px;
    color: #eef0f6;
    font-size: 15px;
    width: 100%;
    transition: border-color 0.2s;
  }
  .field:focus { border-color: #f97316; }
  .field::placeholder { color: #5b5f73; }

  /* ── Button ── */
  .btn-primary {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: #fff;
    font-weight: 600;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 15px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
    font-family: 'DM Sans', system-ui, sans-serif;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent;
    border: 1px solid #2a2d3e;
    color: #8b8fa3;
    font-weight: 500;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    font-family: 'DM Sans', system-ui, sans-serif;
  }
  .btn-ghost:hover { border-color: #f97316; color: #eef0f6; }

  /* ── Badge ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'Fira Code', monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-ok { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
  .badge-locked { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.15); }
  .badge-active { background: rgba(249,115,22,0.15); color: #fb923c; border: 1px solid rgba(249,115,22,0.2); }
  .badge-info { background: rgba(6,182,212,0.15); color: #22d3ee; border: 1px solid rgba(6,182,212,0.2); }

  /* ── Progress Bar ── */
  .progress-track {
    height: 6px;
    background: #1a1d2e;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, #f97316, #fb923c);
    transition: width 0.5s ease;
  }

  /* ── Step indicator ── */
  .step-num {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    font-family: 'Fira Code', monospace;
    font-weight: 600;
    font-size: 14px;
    flex-shrink: 0;
  }

  /* ── Animations ── */
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(249,115,22,0.4); } 100% { box-shadow: 0 0 0 12px rgba(249,115,22,0); } }
  .anim-up { animation: fadeUp 0.4s ease both; }
  .anim-in { animation: fadeIn 0.3s ease both; }
  .d1 { animation-delay: 0.05s; } .d2 { animation-delay: 0.1s; } .d3 { animation-delay: 0.15s; }
  .d4 { animation-delay: 0.2s; } .d5 { animation-delay: 0.25s; } .d6 { animation-delay: 0.3s; }

  /* ── Option Card for Quiz ── */
  .option-card {
    background: #1a1d2e;
    border: 1px solid #2a2d3e;
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .option-card:hover:not(.answered) { border-color: rgba(249,115,22,0.5); background: #1e2233; }
  .option-card.selected-correct { border-color: #22c55e; background: rgba(34,197,94,0.08); }
  .option-card.selected-wrong { border-color: #ef4444; background: rgba(239,68,68,0.08); }
  .option-card.revealed-correct { border-color: rgba(34,197,94,0.3); }
  .option-card .opt-letter {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    background: #2a2d3e;
    font-family: 'Fira Code', monospace;
    font-weight: 600;
    font-size: 13px;
    flex-shrink: 0;
    transition: background 0.2s, color 0.2s;
  }
  .option-card.selected-correct .opt-letter { background: #22c55e; color: #fff; }
  .option-card.selected-wrong .opt-letter { background: #ef4444; color: #fff; }

  /* ── Trap Scenario Box ── */
  .scenario-box {
    background: #1a1d2e;
    border: 1px solid #2a2d3e;
    border-radius: 12px;
    padding: 24px;
    position: relative;
  }
  .scenario-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 12px 12px 0 0;
    background: linear-gradient(90deg, #f97316, #06b6d4);
  }

  /* ── Knowledge Card ── */
  .know-card {
    background: #12141f;
    border: 1px solid #2a2d3e;
    border-left: 3px solid #06b6d4;
    border-radius: 0 10px 10px 0;
    padding: 20px;
  }

  /* ── Reveal Alert ── */
  .reveal-alert {
    background: linear-gradient(135deg, rgba(249,115,22,0.08), rgba(234,88,12,0.04));
    border: 1px solid rgba(249,115,22,0.25);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .field { font-size: 16px; padding: 12px 14px; }
    .btn-primary { padding: 12px 20px; }
  }

  /* Confetti canvas */
  .confetti-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 100;
  }
</style>
</head>

<body x-data="cyberlearn()" x-init="init()" class="min-h-screen">

<!-- ══════════════════════════════════════════════════════════ -->
<!--                    CONFETTI CANVAS                        -->
<!-- ══════════════════════════════════════════════════════════ -->
<canvas x-ref="confettiCanvas" x-show="showConfetti" class="confetti-canvas"></canvas>

<!-- ══════════════════════════════════════════════════════════ -->
<!--                      AUTH VIEW                            -->
<!-- ══════════════════════════════════════════════════════════ -->
<div x-show="view === 'auth'" x-transition:enter="anim-in" class="min-h-screen flex flex-col items-center justify-center px-4 py-8">

  <!-- Logo + tagline -->
  <div class="text-center mb-8 anim-up">
    <div class="flex items-center justify-center gap-3 mb-3">
      <svg class="w-9 h-9 text-accent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span class="font-display font-800 text-2xl tracking-tight">CyberLearn</span>
    </div>
    <p class="text-txt-muted text-sm">透過情境陷阱學會真正的資安防禦</p>
  </div>

  <!-- Auth Card -->
  <div class="card w-full max-w-sm p-6 anim-up d2">

    <!-- Tabs -->
    <div class="flex gap-1 mb-6 bg-base-100 rounded-lg p-1">
      <button @click="authTab='register'"
        :class="authTab==='register' ? 'bg-base-200 text-txt shadow-sm' : 'text-txt-muted'"
        class="flex-1 py-2 text-sm font-semibold rounded-md transition-all cursor-pointer">註冊</button>
      <button @click="authTab='login'"
        :class="authTab==='login' ? 'bg-base-200 text-txt shadow-sm' : 'text-txt-muted'"
        class="flex-1 py-2 text-sm font-semibold rounded-md transition-all cursor-pointer">登入</button>
    </div>

    <!-- Error -->
    <div x-show="authError" x-text="authError" class="text-danger text-sm mb-4 p-3 rounded-lg bg-danger/5 border border-danger/20"></div>

    <!-- Register Form -->
    <template x-if="authTab==='register'">
      <form @submit.prevent="doRegister()" class="space-y-4">
        <div>
          <label class="text-xs font-semibold text-txt-muted uppercase tracking-wider mb-1.5 block">暱稱</label>
          <input x-model="regForm.nickname" class="field" placeholder="取一個代號" required>
        </div>
        <div>
          <label class="text-xs font-semibold text-txt-muted uppercase tracking-wider mb-1.5 block">密碼</label>
          <div class="relative">
            <input :type="showRegPw ? 'text' : 'password'" x-model="regForm.password" @input="checkPasswordStrength()" class="field pr-10" placeholder="至少 8 個字元" required>
            <button type="button" @click="showRegPw=!showRegPw" class="absolute right-3 top-1/2 -translate-y-1/2 text-txt-dim hover:text-txt-muted cursor-pointer">
              <svg x-show="!showRegPw" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg x-show="showRegPw" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <!-- Strength meter -->
          <div x-show="regForm.password.length > 0" class="mt-2">
            <div class="progress-track">
              <div class="progress-fill" :style="`width:${trapStrengthPct}%; background:${trapStrengthColor}`"></div>
            </div>
            <span class="text-xs font-mono mt-1 block" :style="`color:${trapStrengthColor}`" x-text="trapStrengthLabel"></span>
          </div>
        </div>
        <button type="submit" class="btn-primary w-full" :disabled="authLoading">
          <span x-show="!authLoading">建立帳號</span>
          <span x-show="authLoading">處理中…</span>
        </button>
      </form>
    </template>

    <!-- Login Form -->
    <template x-if="authTab==='login'">
      <form @submit.prevent="doLogin()" class="space-y-4">
        <div>
          <label class="text-xs font-semibold text-txt-muted uppercase tracking-wider mb-1.5 block">暱稱</label>
          <input x-model="loginForm.nickname" class="field" placeholder="你的代號" required>
        </div>
        <div>
          <label class="text-xs font-semibold text-txt-muted uppercase tracking-wider mb-1.5 block">密碼</label>
          <div class="relative">
            <input :type="showLoginPw ? 'text' : 'password'" x-model="loginForm.password" class="field pr-10" placeholder="你的密碼" required>
            <button type="button" @click="showLoginPw=!showLoginPw" class="absolute right-3 top-1/2 -translate-y-1/2 text-txt-dim hover:text-txt-muted cursor-pointer">
              <svg x-show="!showLoginPw" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg x-show="showLoginPw" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary w-full" :disabled="authLoading">
          <span x-show="!authLoading">登入</span>
          <span x-show="authLoading">處理中…</span>
        </button>
        <div class="text-center">
          <button type="button" @click="authTab='forgot'" class="text-xs text-txt-dim hover:text-accent transition-colors cursor-pointer">忘記密碼？</button>
        </div>
      </form>
    </template>

    <!-- Forgot Password -->
    <template x-if="authTab==='forgot'">
      <div class="space-y-4">
        <template x-if="!forgotCodeSent">
          <form @submit.prevent="sendResetCode()" class="space-y-4">
            <div>
              <label class="text-xs font-semibold text-txt-muted uppercase tracking-wider mb-1.5 block">綁定的 Email</label>
              <input x-model="forgotEmail" type="email" class="field" placeholder="your@email.com" required>
            </div>
            <button type="submit" class="btn-primary w-full" :disabled="authLoading">寄送驗證碼</button>
          </form>
        </template>
        <template x-if="forgotCodeSent">
          <form @submit.prevent="doResetPassword()" class="space-y-4">
            <div>
              <label class="text-xs font-semibold text-txt-muted uppercase tracking-wider mb-1.5 block">驗證碼</label>
              <input x-model="forgotCode" class="field font-mono text-center tracking-[0.3em]" placeholder="000000" required>
            </div>
            <div>
              <label class="text-xs font-semibold text-txt-muted uppercase tracking-wider mb-1.5 block">新密碼</label>
              <input :type="showResetPw ? 'text' : 'password'" x-model="forgotNewPw" class="field" placeholder="至少 8 個字元" required>
            </div>
            <button type="submit" class="btn-primary w-full" :disabled="authLoading">重設密碼</button>
          </form>
        </template>
        <button @click="authTab='login'; forgotCodeSent=false; forgotEmail=''; forgotCode=''; forgotNewPw='';" class="text-xs text-txt-dim hover:text-accent transition-colors cursor-pointer block mx-auto">← 返回登入</button>
      </div>
    </template>
  </div>

  <!-- Footer -->
  <p class="text-txt-dim text-xs mt-6 anim-up d3">CyberLearn — 情境式互動資安學習平台</p>
</div>

<!-- ══════════════════════════════════════════════════════════ -->
<!--                       MAP VIEW                            -->
<!-- ══════════════════════════════════════════════════════════ -->
<div x-show="view === 'map'" x-transition:enter="anim-in" class="min-h-screen">

  <!-- Nav -->
  <nav class="sticky top-0 z-50 bg-base/80 backdrop-blur-lg border-b border-base-200">
    <div class="max-w-3xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <svg class="w-6 h-6 text-accent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span class="font-display font-700 text-base tracking-tight">CyberLearn</span>
      </div>
      <div class="flex items-center gap-3">
        <span class="badge badge-active font-mono text-xs" x-text="`Lv.${user.level}`"></span>
        <div class="relative">
          <button @click="mapNavOpen = !mapNavOpen" class="flex items-center gap-2 cursor-pointer hover:text-accent transition-colors">
            <span class="text-sm font-semibold hidden sm:block" x-text="user.nickname"></span>
            <svg class="w-5 h-5 text-txt-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
          </button>
          <!-- Dropdown -->
          <div x-show="mapNavOpen" @click.away="mapNavOpen=false" x-transition
            class="absolute right-0 top-full mt-2 w-48 card p-2 shadow-xl z-50">
            <div class="px-3 py-2 border-b border-base-200 mb-1">
              <div class="font-semibold text-sm" x-text="user.nickname"></div>
              <div class="text-xs text-txt-muted font-mono" x-text="`${user.xp} XP · Lv.${user.level}`"></div>
            </div>
            <button @click="logout()" class="w-full text-left px-3 py-2 text-sm text-danger hover:bg-base-100 rounded-md transition-colors cursor-pointer">登出</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-3xl mx-auto px-4 pt-6 pb-20">

    <!-- Header -->
    <div class="mb-8 anim-up">
      <h1 class="font-display font-800 text-2xl sm:text-3xl mb-1">
        嗨，<span class="text-accent" x-text="user.nickname"></span>
      </h1>
      <p class="text-txt-muted text-sm">準備好提升你的資安防禦力了嗎？</p>
    </div>

    <!-- Progress -->
    <div class="card p-4 mb-8 anim-up d1">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-semibold text-txt-muted uppercase tracking-wider">學習進度</span>
        <span class="font-mono text-sm font-semibold text-accent" x-text="`${user.completed_lessons?.length || 0} / ${lessons.length || 5}`"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" :style="`width:${((user.completed_lessons?.length || 0) / (lessons.length || 5)) * 100}%`"></div>
      </div>
      <div class="flex items-center justify-between mt-2">
        <span class="text-xs text-txt-dim font-mono" x-text="`${user.xp} XP`"></span>
        <span class="text-xs text-txt-dim" x-text="user.completed_lessons?.length === (lessons.length || 5) ? '🎉 全部完成！' : '繼續加油'"></span>
      </div>
    </div>

    <!-- Lesson Cards -->
    <div class="space-y-3 mb-10">
      <template x-for="(lesson, idx) in lessons" :key="lesson.id">
        <div class="card interactive anim-up"
          :class="{
            locked: lesson.locked && !isUnlocked(lesson.id) && !user.completed_lessons?.includes(lesson.id),
            completed: user.completed_lessons?.includes(lesson.id)
          }"
          :style="`animation-delay:${0.05 * (idx+2)}s`"
          @click="enterLesson(lesson)">
          <div class="p-4 flex items-center gap-4">
            <!-- Step Number -->

        </div>
      </template>
    </div>

            <div class="space-y-3 text-sm text-txt-muted">
              <div class="flex gap-3"><span class="font-mono text-accent text-xs mt-0.5">01</span><div><strong class="text-txt">中間人攻擊</strong>：攻擊者在你和伺服器之間，看到所有未加密的資料。</div></div>
              <div class="flex gap-3"><span class="font-mono text-accent text-xs mt-0.5">02</span><div><strong class="text-txt">HTTPS 是基本保護</strong>：確認網址有 https:// 和鎖頭，公共 WiFi 上建議加 VPN。</div></div>
              <div class="flex gap-3"><span class="font-mono text-accent text-xs mt-0.5">03</span><div><strong class="text-txt">最佳做法</strong>：優先用手機熱點，必須用公共 WiFi 時開 VPN。</div></div>
            </div>
          </div>
        </div>
      </template>

      <!-- Two Factor -->
      <template x-if="currentLesson?.id === 'two_factor'">
        <div class="anim-up">
          <div class="reveal-alert mb-6">
            <div class="text-3xl mb-3" x-text="trapPasswordOnly === 'no_2fa' ? '😱' : '✅'"></div>
            <h3 class="font-display font-800 text-lg mb-2"
              :class="trapPasswordOnly === 'no_2fa' ? 'text-danger' : 'text-ok'"
              x-text="trapPasswordOnly === 'no_2fa' ? '帳號已被入侵！' : '帳號安全！但⋯⋯'"></h3>
            <p class="text-sm text-txt-muted leading-relaxed" x-show="trapPasswordOnly === 'no_2fa'">
              密碼外洩 + 沒有 2FA = 駭客<strong class="text-danger">直接登入</strong>你的帳號。郵件、照片、個資全暴露。
            </p>
            <p class="text-sm text-txt-muted leading-relaxed" x-show="trapPasswordOnly === 'has_2fa'">
              有 2FA 保護，即使密碼外洩駭客也<strong class="text-ok">無法登入</strong>！<strong class="text-accent">但不是所有 2FA 都一樣安全。</strong>
            </p>
          </div>
          <div class="know-card mb-6 anim-up d1">
            <div class="font-display font-700 text-sm text-info mb-3 flex items-center gap-2">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
              你需要知道的
            </div>
            <div class="space-y-3 text-sm text-txt-muted">
              <div class="flex gap-3"><span class="font-mono text-accent text-xs mt-0.5">01</span><div><strong class="text-txt">什麼是 2FA</strong>：密碼（你知道的）+ 第二因素（你有的東西）= 雙重保護。</div></div>
              <div class="flex gap-3"><span class="font-mono text-accent text-xs mt-0.5">02</span><div><strong class="text-txt">安全等級</strong>：硬體金鑰 > TOTP App > 簡訊驗證碼 > 沒有 2FA。</div></div>
              <div class="flex gap-3"><span class="font-mono text-accent text-xs mt-0.5">03</span><div><strong class="text-txt">立刻行動</strong>：去 Google、Apple、Line 帳號設定裡開啟 2FA。</div></div>
            </div>
          </div>
        </div>
      </template>

      <button class="btn-primary w-full anim-up d2" @click="startQuiz()">
        我學到了，開始測驗 →
      </button>
    </div>

    <!-- ── QUIZ PHASE ── -->
    <div x-show="lessonPhase === 'quiz'">
      <div class="anim-up">
        <!-- Quiz header -->
        <div class="flex items-center justify-between mb-6">
          <span class="text-xs font-mono text-txt-muted" x-text="`Question ${currentQuestionIdx + 1} / ${quizQuestions.length}`"></span>
          <span class="badge badge-info" x-text="`${quizScore} 分`"></span>
        </div>

        <!-- Progress dots -->
        <div class="flex gap-1.5 mb-6">
          <template x-for="(q, qi) in quizQuestions" :key="qi">
            <div class="h-1 flex-1 rounded-full transition-all duration-300"
              :class="qi < currentQuestionIdx ? 'bg-ok' : qi === currentQuestionIdx ? 'bg-accent' : 'bg-base-200'"></div>
          </template>
        </div>

        <!-- Question -->
        <div class="mb-6">
          <h3 class="font-display font-700 text-base leading-relaxed" x-text="quizQuestions[currentQuestionIdx]?.question"></h3>
        </div>

        <!-- Options -->
        <div class="space-y-2.5 mb-6">
          <template x-for="opt in (quizQuestions[currentQuestionIdx]?.options || [])" :key="opt">
            <div @click="submitAnswer(opt.charAt(0))"
              class="option-card"
              :class="{
                'answered pointer-events-none': quizAnswered,
                'selected-correct': quizAnswered && opt.charAt(0) === quizQuestions[currentQuestionIdx]?.answer && selectedAnswer === opt.charAt(0),
                'selected-wrong': quizAnswered && opt.charAt(0) !== quizQuestions[currentQuestionIdx]?.answer && selectedAnswer === opt.charAt(0),
                'revealed-correct': quizAnswered && opt.charAt(0) === quizQuestions[currentQuestionIdx]?.answer && selectedAnswer !== opt.charAt(0),
              }">
              <div class="opt-letter" x-text="opt.charAt(0)"></div>
              <div class="text-sm flex-1 pt-0.5" x-text="opt.substring(3)"></div>
            </div>
          </template>
        </div>

        <!-- Answer Feedback -->
        <div x-show="quizAnswered" class="anim-up">
          <div class="card p-4 mb-4" :class="lastAnswerCorrect ? 'border-ok/30' : 'border-danger/30'">
            <div class="flex items-center gap-2 mb-2">
              <template x-if="lastAnswerCorrect">
                <div class="flex items-center gap-2">
                  <svg class="w-5 h-5 text-ok" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                  <span class="font-display font-700 text-sm text-ok">正確！</span>
                </div>
              </template>
              <template x-if="!lastAnswerCorrect">
                <div class="flex items-center gap-2">
                  <svg class="w-5 h-5 text-danger" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  <span class="font-display font-700 text-sm text-danger">不對喔</span>
                </div>
              </template>
            </div>
            <p class="text-xs text-txt-muted leading-relaxed" x-text="quizQuestions[currentQuestionIdx]?.explanation"></p>
          </div>
          <button class="btn-primary w-full" @click="nextQuestion()"
            x-text="currentQuestionIdx < quizQuestions.length - 1 ? '下一題 →' : '查看結果'"></button>
        </div>
      </div>
    </div>

    <!-- ── COMPLETE PHASE ── -->
    <div x-show="lessonPhase === 'complete'">
      <div class="text-center py-10 anim-up">
        <div class="text-5xl mb-4">🎉</div>
        <h2 class="font-display font-800 text-2xl mb-2">關卡完成！</h2>
        <p class="text-txt-muted mb-2" x-text="`你答對了 ${quizScore} / ${quizQuestions.length} 題`"></p>
        <div class="flex items-center justify-center gap-4 mb-8">
          <span class="badge badge-active text-sm" x-text="`+${completionXP} XP`"></span>
          <span class="badge badge-ok text-sm" x-text="currentLesson?.badge || '🏅 徽章'"></span>
        </div>
        <button class="btn-primary px-8" @click="exitLesson()">返回地圖</button>
      </div>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════════════════════════ -->
<!--                      ALPINE.JS                            -->
<!-- ══════════════════════════════════════════════════════════ -->
<script>
function cyberlearn() {
  return {
    view: 'auth',
    authTab: 'register',
    authLoading: false,
    authError: '',
    isDark: true,
    mapNavOpen: false,
    loginForm: { nickname: '', password: '' },
    regForm: { nickname: '', password: '' },
    showLoginPw: false,
    showRegPw: false,
    showResetPw: false,
    trapStrengthPct: 0,
    trapStrengthLabel: '',
    trapStrengthColor: '',
    user: { id: null, nickname: '', xp: 0, level: 1, completed_lessons: [], email: '' },
    bindEmailInput: '',
    bindEmailLoading: false,
    bindEmailMsg: '',
    bindEmailErr: false,
    forgotEmail: '',
    forgotCode: '',
    forgotNewPw: '',
    forgotCodeSent: false,
    lessons: [],
    currentLesson: null,
    lessonPhase: 'trap',
    trapPassword: '',
    trapMeterPct: 0,
    trapMeterLabel: '',
    trapMeterColor: '',
    trapEmailClicked: false,
    trapInfoGiven: { birthday: '', school: '', pet: '' },
    trapWifiSelected: '',
    trapWifiPassword: '',
    trapPasswordOnly: '',
    quizQuestions: [],
    currentQuestionIdx: 0,
    selectedAnswer: '',
    quizAnswered: false,
    lastAnswerCorrect: false,
    quizScore: 0,
    completionXP: 0,
    showConfetti: false,
    confettiFrame: null,

    async init() {
      document.documentElement.classList.add('dark');
      const saved = localStorage.getItem('cyberlearn_user');
      if (saved) {
        try {
          const cached = JSON.parse(saved);
          if (cached.id) {
            const res = await fetch(`/api/me/${cached.id}`);
            if (res.ok) {
              const data = await res.json();
              this.user = { id: data.user_id, nickname: data.nickname, xp: data.xp, level: data.level, completed_lessons: data.completed_lessons || [], email: data.email || '' };
              localStorage.setItem('cyberlearn_user', JSON.stringify(this.user));
              await this.loadLessons();
              this.view = 'map';
            } else {
              localStorage.removeItem('cyberlearn_user');
            }
          }
        } catch(e) {
          localStorage.removeItem('cyberlearn_user');
        }
      }
    },

    async doLogin() {
      this.authError = '';
      this.authLoading = true;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify(this.loginForm)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || '登入失敗');
        this.user = { id: data.user_id, nickname: data.nickname, xp: data.xp, level: data.level, completed_lessons: data.completed_lessons || [], email: data.email || '' };
        localStorage.setItem('cyberlearn_user', JSON.stringify(this.user));
        await this.loadLessons();
        this.view = 'map';
      } catch(e) {
        this.authError = e.message;
      } finally {
        this.authLoading = false;
      }
    },

    async doRegister() {
      this.authError = '';
      if (this.regForm.nickname.length < 2) { this.authError = '暱稱至少需要 2 個字元'; return; }
      if (this.regForm.password.length < 8) { this.authError = '密碼至少需要 8 個字元'; return; }
      this.authLoading = true;
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ nickname: this.regForm.nickname, password: this.regForm.password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || '註冊失敗');
        this.user = { id: data.user_id, nickname: data.nickname, xp: 0, level: 1, completed_lessons: [], email: '' };
        localStorage.setItem('cyberlearn_user', JSON.stringify(this.user));
        await this.loadLessons();
        this.view = 'map';
      } catch(e) {
        this.authError = e.message;
      } finally {
        this.authLoading = false;
      }
    },

    checkPasswordStrength() {
      const pw = this.regForm.password;
      if (pw.length === 0) { this.trapStrengthPct = 0; return; }
      if (pw.length < 6) {
        this.trapStrengthPct = 30; this.trapStrengthLabel = '弱'; this.trapStrengthColor = '#ef4444';
      } else if (pw.length < 10) {
        this.trapStrengthPct = 85; this.trapStrengthLabel = '強'; this.trapStrengthColor = '#22c55e';
      } else {
        this.trapStrengthPct = 100; this.trapStrengthLabel = '非常強'; this.trapStrengthColor = '#22c55e';
      }
    },

    logout() {
      localStorage.removeItem('cyberlearn_user');
      this.user = { id: null, nickname: '', xp: 0, level: 1, completed_lessons: [], email: '' };
      this.mapNavOpen = false;
      this.view = 'auth';
    },

    async bindEmail() {
      if (!this.bindEmailInput.trim()) return;
      this.bindEmailLoading = true;
      this.bindEmailMsg = '';
      this.bindEmailErr = false;
      try {
        const res = await fetch('/api/bind_email', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ user_id: this.user.id, email: this.bindEmailInput.trim() })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || '綁定失敗');
        this.user.email = data.email;
        localStorage.setItem('cyberlearn_user', JSON.stringify(this.user));
        this.bindEmailMsg = '✓ 綁定成功！';
        this.bindEmailErr = false;
      } catch(e) {
        this.bindEmailMsg = e.message;
        this.bindEmailErr = true;
      } finally {
        this.bindEmailLoading = false;
      }
    },

    async sendResetCode() {
      if (!this.forgotEmail.trim()) return;
      this.authLoading = true;
      this.authError = '';
      try {
        const res = await fetch('/api/forgot_password', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email: this.forgotEmail.trim() })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || '寄送失敗');
        this.forgotCodeSent = true;
      } catch(e) {
        this.authError = e.message;
      } finally {
        this.authLoading = false;
      }
    },

    async doResetPassword() {
      if (!this.forgotCode.trim() || !this.forgotNewPw) return;
      this.authLoading = true;
      this.authError = '';
      try {
        const res = await fetch('/api/reset_password', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email: this.forgotEmail.trim(), code: this.forgotCode.trim(), new_password: this.forgotNewPw })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || '重設失敗');
        this.authError = '';
        this.forgotCodeSent = false;
        this.forgotEmail = '';
        this.forgotCode = '';
        this.forgotNewPw = '';
        this.authTab = 'login';
        alert('密碼已重設成功！請用新密碼登入。');
      } catch(e) {
        this.authError = e.message;
      } finally {
        this.authLoading = false;
      }
    },

    async loadLessons() {
      try {
        const res = await fetch('/api/lessons');
        this.lessons = await res.json();
      } catch(e) { console.error(e); }
    },

    isUnlocked(lessonId) {
      const ids = ['password_strength','phishing','social_engineering','public_wifi','two_factor'];
      const idx = ids.indexOf(lessonId);
      if (idx === 0) return true;
      return this.user.completed_lessons?.includes(ids[idx - 1]) || false;
    },

    getPrevLesson(lessonId) {
      const ids = ['password_strength','phishing','social_engineering','public_wifi','two_factor'];
      const idx = ids.indexOf(lessonId);
      return idx > 0 ? ids[idx - 1] : null;
    },

    enterLesson(lesson) {
      if (lesson.locked && !this.isUnlocked(lesson.id)) {
        alert('請先完成前一個關卡才能解鎖！');
        return;
      }
      this.currentLesson = lesson;
      this.lessonPhase = 'trap';
      this.trapPassword = '';
      this.trapMeterPct = 0;
      this.trapEmailClicked = false;
      this.trapInfoGiven = { birthday: '', school: '', pet: '' };
      this.trapWifiSelected = '';
      this.trapWifiPassword = '';
      this.trapPasswordOnly = '';
      this.quizQuestions = [];
      this.currentQuestionIdx = 0;
      this.quizScore = 0;
      this.showConfetti = false;
      this.view = 'lesson';
    },

    exitLesson() {
      this.view = 'map';
      this.currentLesson = null;
      this.showConfetti = false;
    },

    updateTrapMeter() {
      const pw = this.trapPassword;
      if (!pw) { this.trapMeterPct = 0; return; }
      if (pw.length < 4) {
        this.trapMeterPct = 25; this.trapMeterLabel = '太弱'; this.trapMeterColor = '#ef4444';
      } else if (pw.length < 6) {
        this.trapMeterPct = 50; this.trapMeterLabel = '尚可'; this.trapMeterColor = '#eab308';
      } else {
        this.trapMeterPct = 90; this.trapMeterLabel = '強 ✓'; this.trapMeterColor = '#22c55e';
      }
    },

    async triggerTrap() {
      const id = this.currentLesson?.id;
      if (id === 'password_strength' && (!this.trapPassword || this.trapPassword.length < 4)) return;
      this.lessonPhase = 'trap_reveal';
    },

    async startQuiz() {
      try {
        const res = await fetch(`/api/questions/${this.currentLesson.id}?user_id=${this.user.id}`);
        const data = await res.json();
        this.quizQuestions = data.questions;
      } catch(e) {
        this.quizQuestions = [];
      }
      this.currentQuestionIdx = 0;
      this.quizScore = 0;
      this.quizAnswered = false;
      this.lessonPhase = 'quiz';
    },

    async submitAnswer(answer) {
      if (this.quizAnswered) return;
      this.selectedAnswer = answer;
      this.quizAnswered = true;
      const q = this.quizQuestions[this.currentQuestionIdx];
      try {
        const res = await fetch('/api/answer', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ user_id: this.user.id, question_id: q.id, answer, time_spent: 0 })
        });
        const data = await res.json();
        this.lastAnswerCorrect = data.is_correct;
        if (data.is_correct) this.quizScore++;
      } catch(e) {
        this.lastAnswerCorrect = answer === q.answer;
        if (this.lastAnswerCorrect) this.quizScore++;
      }
    },

    async nextQuestion() {
      if (this.currentQuestionIdx < this.quizQuestions.length - 1) {
        this.currentQuestionIdx++;
        this.quizAnswered = false;
        this.selectedAnswer = '';
      } else {
        await this.completeLesson();
      }
    },

    async completeLesson() {
      try {
        const res = await fetch('/api/complete_lesson', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ user_id: this.user.id, lesson_id: this.currentLesson.id })
        });
        if (!res.ok) throw new Error('API error');
        const data = await res.json();
        this.completionXP = data.xp_gained;
        this.user.xp = data.xp;
        this.user.level = data.level;
        this.user.completed_lessons = data.completed_lessons;
        localStorage.setItem('cyberlearn_user', JSON.stringify(this.user));
      } catch(e) {
        console.error('completeLesson failed:', e);
        this.completionXP = 0;
        if (!this.user.completed_lessons.includes(this.currentLesson.id)) {
          this.user.completed_lessons.push(this.currentLesson.id);
          localStorage.setItem('cyberlearn_user', JSON.stringify(this.user));
        }
      }
      this.lessonPhase = 'complete';
      this.$nextTick(() => this.launchConfetti());
    },

    launchConfetti() {
      const canvas = this.$refs.confettiCanvas;
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      if (!ctx) return;
      const w = window.innerWidth, h = window.innerHeight;
      canvas.width = w; canvas.height = h;
      const colors = ['#f97316','#fb923c','#22c55e','#06b6d4','#eab308'];
      const pieces = Array.from({length:100},(_,i)=>({
        x: w*0.5, y: h*0.3,
        vx: (Math.random()-0.5)*12,
        vy: -Math.random()*8 - 3,
        size: Math.random()*5+3,
        rot: Math.random()*Math.PI*2,
        spin: (Math.random()-0.5)*0.2,
        color: colors[i%colors.length],
      }));
      if (this.confettiFrame) cancelAnimationFrame(this.confettiFrame);
      this.showConfetti = true;
      const start = performance.now();
      const tick = (now) => {
        ctx.clearRect(0,0,w,h);
        for (const p of pieces) {
          p.vy += 0.22; p.x += p.vx; p.y += p.vy; p.rot += p.spin;
          ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
          ctx.restore();
        }
        if (now - start < 2200) { this.confettiFrame = requestAnimationFrame(tick); }
        else { this.showConfetti = false; ctx.clearRect(0,0,w,h); }
      };
      this.confettiFrame = requestAnimationFrame(tick);
    },
  }
}
</script>
