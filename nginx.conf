# /etc/nginx/sites-available/cyberlearn
# CyberLearn Nginx 反向代理設定
# 使用前請將 YOUR_DOMAIN 替換為你的實際域名

limit_req_zone $binary_remote_addr zone=cyberlearn_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=cyberlearn_chat:10m rate=10r/m;

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # 強制 HTTPS redirect
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

    # FastAPI backend
    location /api/ {
        limit_req zone=cyberlearn_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        chunked_transfer_encoding on;
    }

    # Chat endpoint - stricter rate limit
    location /api/chat {
        limit_req zone=cyberlearn_chat burst=5 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 180s;
        chunked_transfer_encoding on;
    }

    # Static files
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Cache static assets
        location ~* \.(js|css|png|jpg|ico|svg)$ {
            proxy_pass http://127.0.0.1:8000;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Block common vulnerability probes
    location ~* \.(php|asp|aspx|jsp)$ {
        return 404;
    }
}
